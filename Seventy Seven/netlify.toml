# netlify.toml — Seventy Seven Stickers
# No build step needed — pure HTML/CSS/JS

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.sanity.io https://cdn.sanity.io https://wa.me; img-src 'self' https://cdn.sanity.io data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;"
